<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
</style>


<div id="gw"
  style="position:relative;width:100%;height:100%;overflow:hidden;background:transparent;border-radius:12px;">
  <div id="gm" style="position:absolute;inset:0;"></div>
  <!-- Text overlays removed -->
  <div id="tip"
    style="position:absolute;display:none;background:rgba(0,0,0,0.95);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:6px 14px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;pointer-events:none;border-radius:2px;z-index:20;">
  </div>
  <div id="ld"
    style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:15;background:transparent;">
    <div
      style="color:#fff;font-family:'Courier New',monospace;font-size:11px;letter-spacing:5px;text-transform:uppercase;"
      id="ldtxt"></div>
    <div style="width:180px;height:1px;background:rgba(255,255,255,0.1);position:relative;overflow:hidden;">
      <div id="lb" style="position:absolute;top:0;bottom:0;left:0;width:0;background:#fff;transition:width 0.4s ease;">
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  (async function () {
    const PINS = [
      { lat: 40.7128, lon: -74.0060, label: "New York", country: "USA" },
      { lat: 51.5074, lon: -0.1278, label: "London", country: "UK" },
      { lat: 48.8566, lon: 2.3522, label: "Paris", country: "France" },
      { lat: 35.6762, lon: 139.6503, label: "Tokyo", country: "Japan" },
      { lat: 1.3521, lon: 103.8198, label: "Singapore", country: "Singapore" },
      { lat: 13.0827, lon: 80.2707, label: "Chennai", country: "India" },
      { lat: -33.868, lon: 151.209, label: "Sydney", country: "Australia" },
      { lat: -23.550, lon: -46.633, label: "São Paulo", country: "Brazil" },
      { lat: 25.204, lon: 55.271, label: "Dubai", country: "UAE" },
      { lat: 55.7558, lon: 37.6173, label: "Moscow", country: "Russia" },
      { lat: -33.9249, lon: 18.4241, label: "Cape Town", country: "South Africa" },
      { lat: 31.2304, lon: 121.4737, label: "Shanghai", country: "China" },
      { lat: 19.4326, lon: -99.1332, label: "Mexico City", country: "Mexico" },
      { lat: 60.1699, lon: 24.9384, label: "Helsinki", country: "Finland" },
      { lat: 30.0444, lon: 31.2357, label: "Cairo", country: "Egypt" },
      { lat: -34.6037, lon: -58.3816, label: "Buenos Aires", country: "Argentina" },
      { lat: 59.3293, lon: 18.0686, label: "Stockholm", country: "Sweden" },
      { lat: 37.5665, lon: 126.9780, label: "Seoul", country: "South Korea" },
      { lat: 39.9042, lon: 116.4074, label: "Beijing", country: "China" },
      { lat: 34.0522, lon: -118.2437, label: "Los Angeles", country: "USA" },
      { lat: 22.3193, lon: 114.1694, label: "Hong Kong", country: "China" },
      { lat: 52.5200, lon: 13.4050, label: "Berlin", country: "Germany" },
      { lat: 41.9028, lon: 12.4964, label: "Rome", country: "Italy" },
      { lat: 55.6761, lon: 12.5683, label: "Copenhagen", country: "Denmark" },
      { lat: 28.6139, lon: 77.2090, label: "New Delhi", country: "India" },
    ];

    const gw = document.getElementById('gw'), gm = document.getElementById('gm');
    const ld = document.getElementById('ld'), lb = document.getElementById('lb'), ldtxt = document.getElementById('ldtxt');
    const tip = document.getElementById('tip');
    const W = gw.clientWidth || 680, H = gw.clientHeight || 600;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, W / H, 0.01, 500);
    camera.position.z = 3.5;
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 0); // Transparent background
    renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
    gm.appendChild(renderer.domElement);

    // Subtle lighting - reduced sun
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(6, 3, 4); scene.add(sun);
    const fill = new THREE.DirectionalLight(0xffffff, 0.2);
    fill.position.set(-4, -2, -3); scene.add(fill);

    // Stars removed

    const urlParams = new URLSearchParams(window.location.search);
    const offsetX = parseFloat(urlParams.get('x')) || 0;
    const globe = new THREE.Group();
    globe.position.x = offsetX;
    scene.add(globe);
    lb.style.width = '18%';

    function loadImg(url) { return new Promise((res, rej) => { const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = () => res(img); img.onerror = rej; img.src = url; }); }

    let earthImg = null;
    for (const u of ['https://unpkg.com/three-globe/example/img/earth-day.jpg', 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-day.jpg']) {
      try { earthImg = await loadImg(u); break; } catch (e) { }
    }
    lb.style.width = '55%';

    let globeMat;
    if (earthImg) {
      const tex = new THREE.CanvasTexture(earthImg);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      globeMat = new THREE.MeshPhongMaterial({ map: tex, specular: new THREE.Color(0.1, 0.18, 0.3), shininess: 22 });
      let bumpImg = null;
      for (const u of ['https://unpkg.com/three-globe/example/img/earth-topology.png', 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png']) {
        try { bumpImg = await loadImg(u); break; } catch (e) { }
      }
      if (bumpImg) { const bt = new THREE.CanvasTexture(bumpImg); globeMat.bumpMap = bt; globeMat.bumpScale = 0.045; }
    } else {
      globeMat = new THREE.MeshPhongMaterial({ color: 0x1a4477, specular: 0x0a2244, shininess: 18 });
    }
    lb.style.width = '75%';

    globe.add(new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), globeMat));
    // atmosphere
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(1.019, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.04, shininess: 0, depthWrite: false })));
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(1.10, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0x222222, transparent: true, opacity: 0.02, shininess: 0, depthWrite: false, side: THREE.BackSide })));

    function toVec(lat, lon, r = 1) {
      const p = (90 - lat) * Math.PI / 180, t = ((lon + 180) % 360) * Math.PI / 180;
      return new THREE.Vector3(-r * Math.sin(p) * Math.cos(t), r * Math.cos(p), r * Math.sin(p) * Math.sin(t));
    }
    const ZUP = new THREE.Vector3(0, 0, 1);
    const YUP = new THREE.Vector3(0, 1, 0);
    const pinHits = [], beamGroups = [];

    // Needle beam texture - very thin, sharp, bright at base fading to nothing
    function makeNeedleTex() {
      const c = document.createElement('canvas'); c.width = 32; c.height = 512;
      const ctx = c.getContext('2d');
      // vertical gradient: bright flash at bottom, sharp fade upward
      const vg = ctx.createLinearGradient(0, 512, 0, 0);
      vg.addColorStop(0, 'rgba(255,255,255,1)');
      vg.addColorStop(0.04, 'rgba(255,255,255,0.95)');
      vg.addColorStop(0.15, 'rgba(255,255,255,0.6)');
      vg.addColorStop(0.35, 'rgba(255,255,255,0.25)');
      vg.addColorStop(0.6, 'rgba(255,255,255,0.08)');
      vg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = vg; ctx.fillRect(0, 0, 32, 512);
      // horizontal - very narrow bright core, soft edges
      const hg = ctx.createLinearGradient(0, 0, 32, 0);
      hg.addColorStop(0, 'rgba(0,0,0,1)');
      hg.addColorStop(0.3, 'rgba(0,0,0,0.55)');
      hg.addColorStop(0.5, 'rgba(0,0,0,0)');
      hg.addColorStop(0.7, 'rgba(0,0,0,0.55)');
      hg.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = hg; ctx.fillRect(0, 0, 32, 512);
      return new THREE.CanvasTexture(c);
    }

    function makeBaseTex() {
      const c = document.createElement('canvas'); c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.08, 'rgba(255,255,255,0.8)');
      g.addColorStop(0.22, 'rgba(255,255,255,0.4)');
      g.addColorStop(0.5, 'rgba(255,255,255,0.1)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(c);
    }

    function makeRippleTex() {
      const c = document.createElement('canvas'); c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64, 64, 24, 64, 64, 64);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(0.38, 'rgba(255,255,255,0.5)');
      g.addColorStop(0.52, 'rgba(255,255,255,0.2)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(c);
    }

    const needleTex = makeNeedleTex();
    const baseTex = makeBaseTex();
    const rippleTex = makeRippleTex();

    lb.style.width = '90%';

    PINS.forEach((p, idx) => {
      const n = toVec(p.lat, p.lon).normalize();
      const bg = new THREE.Group();
      bg.userData = { phase: idx * 0.91, label: p.label, country: p.country };
      globe.add(bg); beamGroups.push(bg);

      // invisible hit sphere
      const hit = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }));
      hit.position.copy(n.clone().multiplyScalar(1.006));
      hit.userData = { label: p.label, country: p.country };
      globe.add(hit); pinHits.push(hit);

      // base glow disc
      const base = new THREE.Mesh(new THREE.PlaneGeometry(0.09, 0.09),
        new THREE.MeshBasicMaterial({
          map: baseTex, transparent: true, opacity: 0.9, depthWrite: false,
          side: THREE.DoubleSide, blending: THREE.AdditiveBlending
        }));
      base.position.copy(n.clone().multiplyScalar(1.003));
      base.quaternion.setFromUnitVectors(ZUP, n);
      bg.add(base);

      // ripple ring
      const ripple = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 0.18),
        new THREE.MeshBasicMaterial({
          map: rippleTex, transparent: true, opacity: 0.55, depthWrite: false,
          side: THREE.DoubleSide, blending: THREE.AdditiveBlending
        }));
      ripple.position.copy(n.clone().multiplyScalar(1.003));
      ripple.quaternion.setFromUnitVectors(ZUP, n);
      bg.add(ripple);

      // needle beam - very thin tall plane, billboarded toward camera via group
      // Use two crossed planes for 3D needle look
      const needleH = 0.42;
      const needleW = 0.012;
      const needleGeo = new THREE.PlaneGeometry(needleW, needleH);
      // shift geometry so base sits at origin, tip at +Y
      needleGeo.translate(0, needleH / 2, 0);

      const needleMat = new THREE.MeshBasicMaterial({
        map: needleTex, transparent: true, opacity: 0.88,
        depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
      });

      // needle rotated to align with surface normal
      const needle1 = new THREE.Mesh(needleGeo, needleMat);
      const needle2 = new THREE.Mesh(needleGeo, needleMat.clone());

      // position at surface, orient along normal
      const basePos = n.clone().multiplyScalar(1.003);
      needle1.position.copy(basePos);
      needle2.position.copy(basePos);

      // align Y-axis to normal
      needle1.quaternion.setFromUnitVectors(YUP, n);
      needle2.quaternion.setFromUnitVectors(YUP, n);
      // rotate second needle 90° around normal to cross
      const axisQ = new THREE.Quaternion().setFromAxisAngle(n, Math.PI / 2);
      needle2.quaternion.premultiply(axisQ);

      bg.add(needle1);
      bg.add(needle2);

      // second wider soft beam for glow around needle
      const softW = 0.032, softH = 0.28;
      const softGeo = new THREE.PlaneGeometry(softW, softH);
      softGeo.translate(0, softH / 2, 0);
      const softMat = new THREE.MeshBasicMaterial({
        map: needleTex, transparent: true, opacity: 0.22,
        depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
      });
      const soft = new THREE.Mesh(softGeo, softMat);
      soft.position.copy(basePos);
      soft.quaternion.setFromUnitVectors(YUP, n);
      bg.add(soft);

      // pinpoint core dot - tiny, bright white
      const core = new THREE.Mesh(new THREE.SphereGeometry(0.005, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xffffff }));
      core.position.copy(n.clone().multiplyScalar(1.007));
      bg.add(core);
    });

    // pcnt update removed
    lb.style.width = '100%';
    setTimeout(() => { ld.style.opacity = '0'; ld.style.transition = 'opacity 0.5s'; setTimeout(() => { ld.style.display = 'none'; }, 500); }, 420);

    // Interaction
    const ray = new THREE.Raycaster(); const m2 = new THREE.Vector2();
    gm.addEventListener('mousemove', e => {
      const rc = gw.getBoundingClientRect(), cx = e.clientX - rc.left, cy = e.clientY - rc.top;
      m2.x = (cx / W) * 2 - 1; m2.y = -(cy / H) * 2 + 1;
      ray.setFromCamera(m2, camera);
      const hits = ray.intersectObjects(pinHits);
      if (hits.length) {
        gm.style.cursor = 'crosshair';
      } else { tip.style.display = 'none'; gm.style.cursor = 'grab'; }
    });
    gm.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    let drag = false, px = 0, py = 0, vx = 0, vy = 0, autoSpin = true, st;
    gm.addEventListener('mousedown', e => { drag = true; autoSpin = false; clearTimeout(st); px = e.clientX; py = e.clientY; vx = vy = 0; gm.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', e => { if (!drag) return; vy = (e.clientX - px) * 0.008; vx = (e.clientY - py) * 0.008; globe.rotation.y += vy; globe.rotation.x = Math.max(-0.9, Math.min(0.9, globe.rotation.x + vx)); px = e.clientX; py = e.clientY; });
    window.addEventListener('mouseup', () => { if (!drag) return; drag = false; gm.style.cursor = 'grab'; st = setTimeout(() => { autoSpin = true; }, 3500); });
    gm.addEventListener('touchstart', e => { drag = true; autoSpin = false; clearTimeout(st); px = e.touches[0].clientX; py = e.touches[0].clientY; }, { passive: true });
    gm.addEventListener('touchmove', e => { if (!drag) return; globe.rotation.y += (e.touches[0].clientX - px) * 0.008; globe.rotation.x = Math.max(-0.9, Math.min(0.9, globe.rotation.x + (e.touches[0].clientY - py) * 0.008)); px = e.touches[0].clientX; py = e.touches[0].clientY; }, { passive: true });
    gm.addEventListener('touchend', () => { drag = false; st = setTimeout(() => { autoSpin = true; }, 3500); });
    try { const ro = new ResizeObserver(() => { const nW = gw.clientWidth, nH = gw.clientHeight; camera.aspect = nW / nH; camera.updateProjectionMatrix(); renderer.setSize(nW, nH); }); ro.observe(gw); } catch (e) { }

    let t = 0;
    let rafId = null;
    let isVisible = true;

    // Pause animation when globe is scrolled off-screen
    const observer = new IntersectionObserver((entries) => {
      isVisible = entries[0].isIntersecting;
      if (isVisible && rafId === null) startLoop();
    }, { threshold: 0.05 });
    observer.observe(gw);

    function tick() {
      t += 0.016;
      if (autoSpin && !drag) globe.rotation.y += 0.0016;
      else if (!drag) { vx *= 0.92; vy *= 0.92; globe.rotation.y += vy; globe.rotation.x = Math.max(-0.9, Math.min(0.9, globe.rotation.x + vx)); }

      beamGroups.forEach(bg => {
        const ph = bg.userData.phase;
        const fast = (Math.sin(t * 1.7 + ph) + 1) / 2;
        const slow = (Math.sin(t * 0.5 + ph * 0.6) + 1) / 2;
        const ch = bg.children;
        if (ch[0]) ch[0].material.opacity = 0.55 + fast * 0.4;
        if (ch[1]) { ch[1].material.opacity = 0.15 + slow * 0.42; const s = 1 + slow * 0.55; ch[1].scale.set(s, s, 1); }
        if (ch[2]) ch[2].material.opacity = 0.7 + fast * 0.28;
        if (ch[3]) ch[3].material.opacity = 0.7 + fast * 0.28;
        if (ch[4]) ch[4].material.opacity = 0.1 + fast * 0.16;
        if (ch[5]) { const cs = 0.9 + fast * 0.3; ch[5].scale.set(cs, cs, cs); }
      });

      renderer.render(scene, camera);
      rafId = isVisible ? requestAnimationFrame(tick) : null;
    }

    function startLoop() {
      if (rafId !== null) return;
      rafId = requestAnimationFrame(tick);
    }

    startLoop();
    gm.style.cursor = 'grab';
  })();
</script>
